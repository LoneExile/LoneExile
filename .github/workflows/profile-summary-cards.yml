name: GitHub Profile Summary Cards

on:
  schedule: # regenerate cards automatically
    - cron: '0 0 * * *' # daily at midnight UTC
  workflow_dispatch: # allow manual runs
  push:
    branches: [ main ]

jobs:
  build:
    name: Generate profile summary card SVGs
    runs-on: ubuntu-latest
    permissions:
      contents: write # needed to auto-commit the generated SVGs
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate cards
        uses: vn7n24fzkq/github-profile-summary-cards@main
        env:
          GITHUB_TOKEN: ${{ secrets.SUMMARY_GITHUB_TOKEN }}
        with:
          USERNAME: ${{ github.repository_owner }}
          BRANCH_NAME: main
          UTC_OFFSET: 7 # Bangkok time
          AUTO_PUSH: true
